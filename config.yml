baseURL: "https://henrikkudesu.github.io/"
title: Henrique
paginate: 5
theme: PaperMod

enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false

googleAnalytics: UA-123-45

minify:
  disableXML: true
  minifyOutput: true

params:
  env: production # to enable google analytics, opengraph, twitter-cards and schema.
  title: Henrique
  description: "Bem vindo ao meu blog pessoal."
  keywords: [Blog, Portfolio, Desenvolvimento, Programação, Web Development, HTML, CSS, Javascript, Junior, PaperMod]
  author: Me
  # author: ["Me", "You"] # multiple authors
  #images: ["<link or path of image for opengraph, twitter-cards>"]
  DateFormat: "January 2, 2006"
  defaultTheme: auto # dark, light
  disableThemeToggle: false

  ShowReadingTime: true
  ShowShareButtons: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: false
  disableSpecial1stPost: false
  disableScrollToTop: false
  comments: false
  hidemeta: false
  hideSummary: false
  showtoc: false
  tocopen: false

  assets:
    # disableHLJS: true # to disable highlight.js
    # disableFingerprinting: true
    favicon: "img/favicon.ico"
    favicon16x16: "img/favicon-16x16.png"
    favicon32x32: "img/favicon-32x32.png"
    #apple_touch_icon: "<link / abs url>"
    #safari_pinned_tab: "<link / abs url>"

  label:
    text: "Home"
    # icon: img/apple-icon.png
    iconHeight: 35

  # profile-mode
  profileMode:
    enabled: true # needs to be explicitly set
    title: Henrique
    subtitle: "Bem vindo ao meu blog pessoal."
    imageUrl: "https://avatars.githubusercontent.com/u/50160686?v=4"
    imageWidth: 120
    imageHeight: 120
    imageTitle: perfil
    buttons:
      - name: Posts
        url: posts
      - name: Tags
        url: tags
      - name: Contato
        url: contato

  # home-info mode
  homeInfoParams:
    Title: "Olá \U0001F44B"
    Content: Bem vindo ao meu blog!

  socialIcons:
    - name: twitter
      url: "https://twitter.com/henrikkudesu"
    - name: github
      url: "https://github.com/henrikkudesu"
    - name: linkedin
      url: "https://www.linkedin.com/in/leonardo-henrique-gtngta/"

  analytics:
    google:
      SiteVerificationTag: "XYZabc"
    bing:
      SiteVerificationTag: "XYZabc"
    yandex:
      SiteVerificationTag: "XYZabc"

  cover:
    hidden: true # hide everywhere but not in structured data
    hiddenInList: true # hide on list pages and home
    hiddenInSingle: true # hide on single page

  # editPost:
  #  URL: "https://github.com/<path_to_repo>/content"
  #  Text: "Suggest Changes" # edit text
  #  appendFilePath: true # to append file path to Edit link

  # for search
  # https://fusejs.io/api/options.html
  fuseOpts:
    isCaseSensitive: false
    shouldSort: true
    location: 0
    distance: 1000
    threshold: 0.4
    minMatchCharLength: 0
    keys: ["title", "permalink", "summary", "content"]
menu:
  main:
    - identifier: posts
      name: posts
      url: /posts
      weight: 10
    - identifier: tags
      name: tags
      url: /tags
      weight: 20
    - identifier: contato
      name: contato
      url: /contato
      weight: 30
    #- identifier: example
    #  name: example.org
    #  url: https://example.org
    #  weight: 30
