baseURL: 'https://henrikkudesu.github.io/'
languageCode: 'en-us'
title: 'Leonardo Henrique'
theme: hugo-profile

outputs:
  home:
    - 'HTML'
    - 'RSS'
    - 'JSON'
  page:
    - 'HTML'
    - 'RSS'

# Paginate: 5 DEPRECATED
pagination:
  disableAliases: false
  pagerSize: 5
  path: page
enableRobotsTXT: true
# googleAnalytics: UA-123-45

markup:
  goldmark:
    renderer:
      unsafe: true

Menus:
  main:
    - identifier: posts
      name: Posts
      title: Blog posts
      url: /posts
      weight: 1

params:
  title: 'Leonardo Henrique'
  description: 'Welcome to my personal blog.'
  favicon: '/favicon.png'
  useBootstrapCDN: false
  mathjax: false
  animate: true

  theme:
    defaultTheme: auto
    disableThemeToggle: false

  font:
    fontSize: 1rem
    fontWeight: 400
    lineHeight: 1.5
    textAlign: left

  navbar:
    align: ms-auto
    brandName: 'Leonardo Henrique'
    disableSearch: false
    stickyNavBar:
      enable: true
      showOnScrollUp: true
    enableSeparator: false
    menus:
      disableAbout: false
      disableExperience: false
      disableEducation: false
      disableProjects: false
      disableAchievements: false
      disableContact: false

  hero:
    enable: true
    intro: 'Hi! My name is'
    title: 'Leonardo Henrique.'
    subtitle: 'I am a software developer.'
    image: 'https://avatars.githubusercontent.com/u/50160686?v=4'
    bottomImage:
      enable: true
    button:
      enable: true
      name: 'Resume (English)'
      url: 'https://github.com/henrikkudesu/henrikkudesu.github.io/tree/main/resume/resume_en_US.pdf'
    newPage: false
    socialLinks:
      fontAwesomeIcons:
        #- icon: fab fa-twitter
        #  url: 'https://twitter.com/henrikkudesu'
        - icon: fab fa-github
          url: 'https://github.com/henrikkudesu'
        - icon: fab fa-linkedin
          url: 'https://linkedin.com/in/leonardo-henrikku'

  # About
  about:
    enable: true
    title: 'About Me'
    image: '/me.jpg'
    content: |-
      I am a software developer currently studying IT Management at FATEC (Guaratinguetá, SP, Brazil). I train my skills daily to become a full-stack developer. Passionate about technology, I am always seeking new challenges and opportunities to grow.

    skills:
      enable: true
      title: "Here are a few technologies I've been working with recently:"
      items:
        - 'HTML'
        - 'CSS'
        - 'SASS'
        - 'Tailwind CSS'
        - 'JavaScript'
        - 'TypeScript'
        - 'React'
        - 'Node'
        - 'Express'
        - 'Vite'

  # Education
  education:
    enable: true
    # title: "Custom Name"
    index: false
    items:
      - title: 'Information Technology Management'
        school:
          name: 'FATEC - Prof. João Mod. Guaratinguetá'
          url: 'https://www.cps.sp.gov.br/fatec-guaratingueta/'
        date: '2024 - Currently'
        content: |-
          Main subjects:
            - Algorithms
            - Comunication
            - Project Management
            - Team Management
            - Software Engineering
            - Databases
      - title: 'Systems Analysis and Development'
        school:
          name: 'UNIP - Paulista University'
          url: 'https://www.unip.br'
        date: '2020 - 2022'
        content: |-
          Main subjects:
            - Programming Logic
            - Web Development
            - Mobile Development
            - Agile Methodologies
            - Mathematics and Statistics
            - Computer Networks and Distributed Systems

  # projects
  projects:
    enable: true
    # title: "Custom Name"
    items:
      - title: Frontend Mentor Challenges
        content: A collection of Frontend Mentor challenges, showcasing various UI designs and frontend development skills.
        image: /img/projects/frontendmentor.png
        featured:
          name: Repository
          link: https://github.com/henrikkudesu/frontendmentor-challenges
        badges:
          - 'Javascript'
          - 'CSS'
          - 'Semantic HTML'
        links:
          - icon: fab fa-github
            url: https://github.com/gurusabarish/hugo-profile

      - title: REST Countries App
        content: A web application that fetches country data from the REST Countries API, displaying details with dark/light mode support.
        image: /img/projects/rest-countries.png
        featured:
          name: Demo
          link: https://rest-countries-app-tawny.vercel.app/
        badges:
          - 'Vite'
          - 'React'
          - 'Typescript'
          - 'Tailwind CSS'
          - 'Rest'
        links:
          - icon: fab fa-github
            url: https://github.com/henrikkudesu/rest-countries-app

      - title: Weather App
        content: A simple weather app that fetches real-time weather data using OpenWeather API.
        image: /img/projects/weather.png
        featured:
          name: Demo
          link: https://henrikku-weather-app.vercel.app/
        badges:
          - 'HTML'
          - 'CSS'
          - 'Javascript'
          - 'OpenWeather API'
        links:
          - icon: fab fa-github
            url: https://github.com/henrikkudesu/henrikku-weather-app

      - title: Civil Society Organization (CSO) Website (INESP Brasil)
        content: I volunteered for a project to develop an online portal for the non-profit organization Instituto de Espetáculos Públicos do Brasil (Inesp Brasil).
        image: /img/projects/inesp-brasil.png
        featured:
          name: Site
          link: https://www.inespbrasil.site/
        badges:
          - 'HTML'
          - 'CSS'
          - 'Javascript'
          - 'PHP'
          - 'WordPress'
        #links:
        #- icon: fab fa-github
        #url: https://github.com/henrikkudesu/henrikku-weather-app

      - title: LyriCat
        content: An application that translates songs to Brazilian Portuguese and provides AI-powered explanations of their meanings and contexts.
        image: /img/projects/lyricat-2.png
        featured:
          name: Demo
          link: https://lyrycatfront.vercel.app
        badges:
          - 'React'
          - 'Typescript'
          - 'Python'
          - 'Flask'
          - 'Gemini IA'
        links:
          - icon: fab fa-github
            url: https://github.com/henrikkudesu/LyriCat/tree/main

      - title: Quick Alias
        content: A browser extension that allows you to create custom text shortcuts (aliases) preceded by '/' to quickly insert predefined texts.
        image: /img/projects/quickalias.png
        featured:
          name: Firefox Addon Store
          link: https://addons.mozilla.org/pt-BR/firefox/addon/quickalias/
        badges:
          - 'Javascript'
        links:
          - icon: fab fa-github
            url: https://github.com/henrikkudesu/quickAlias

  #Contact
  contact:
    enable: true
    # title: "Custom Name"
    content: My inbox is always open. Feel free to contact me if you are interested in doing business or scheduling an interview.
    btnName: Mail me
    btnLink: mailto:leo_hns@hotmail.com

  footer:
    recentPosts:
      path: 'posts'
      count: 3
      title: Recent Posts
      enable: true
      disableFeaturedImage: false
    socialNetworks:
      github: https://github.com/henrikkudesu
      linkedin: https://www.linkedin.com/in/leonardo-henrikku/

  showReadingTime: true
  showShareButtons: true
  showPostNavLinks: true
  showBreadCrumbs: true
  showCodeCopyButtons: false
  disableScrollToTop: false
  comments: false

  analytics:
    google:
      SiteVerificationTag: 'XYZabc'
    bing:
      SiteVerificationTag: 'XYZabc'
    yandex:
      SiteVerificationTag: 'XYZabc'

  cover:
    hidden: true
    hiddenInList: true
    hiddenInSingle: true

  fuseOpts:
    isCaseSensitive: false
    shouldSort: true
    location: 0
    distance: 1000
    threshold: 0.4
    minMatchCharLength: 0
    keys: ['title', 'permalink', 'summary', 'content']
